<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ВЕБ Графіка</title>
	<link href="https://fonts.googleapis.com/css?family=DM+Sans:regular,700" rel="stylesheet"/>
	<link rel="stylesheet" href="css/fonts.css">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<header class="header">
		<p>ВЕБ Графіка</p>
	</header>
	<main class="main">
		<div class="main__box">
			<picture class="picture">
				<source srcset="img/bg-1x.avif 1x, img/bg-2x.avif 2x, img/bg-3x.avif 3x">
				<img class="picture__image" src="img/bg-1x.avif" alt="Image">
			</picture>
			<p>Контент AVIF 1X, AVIF 2X, AVIF 3X</p>
			<picture class="picture">
				<source srcset="img/card1-1x.avif 1x, img/card1-2x.avif 2x, img/card1-3x.avif 3x">
				<img class="picture__image" src="img/card1-1x.avif" alt="Image">
			</picture>
			<p>Контент AVIF 1X, AVIF 2X, AVIF 3X</p>
			<picture class="picture">
				<source srcset="img/card2-1x.avif 1x, img/card2-2x.avif 2x, img/card2-3x.avif 3x">
				<img class="picture__image" src="img/card2-1x.avif" alt="Image">
			</picture>
			<p>Контент AVIF 1X, AVIF 2X, AVIF 3X</p>
			<picture class="picture">
				<source srcset="img/card3-1x.avif 1x, img/card3-2x.avif 2x, img/card3-3x.avif 3x">
				<img class="picture__image" src="img/card3-1x.avif" alt="Image">
			</picture>
			<p>Контент AVIF 1X, AVIF 2X, AVIF 3X</p>
			<div class="main__box-icons">
				<img src="img/user.svg" alt="icon-user">
				<img src="img/search.svg" alt="search-user">
				<img src="img/heart.svg" alt="heart-user">
				<img src="img/buy.svg" alt="buy-user">
			</div>
			<span>Іконки, векторна графіка</span>
		</div>
	</main>
	<footer class="footer">
		<p>Homework</p>
	</footer>
</body>
</html>
